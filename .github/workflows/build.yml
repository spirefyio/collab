name: collab build

# ── CI cost policy: MANUAL-ONLY ──────────────────────────────────────────────
# The ONLY trigger is workflow_dispatch — nothing runs automatically (no push /
# pull_request / schedule). Start a build from the Actions tab ("Run workflow"),
# with `./scripts/ci.sh <branch>`, or `gh workflow run build.yml --ref <branch>`.
#
# NOTE: to be dispatchable at all, GitHub requires this file to exist on the
# repo's DEFAULT branch. Recommended one-time setup: make `dev` the default
# branch (Settings → Branches, or `gh repo edit --default-branch dev`).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag of the sibling repos (zora, ai, desktop) to check out and fork. Blank = same ref as this run."
        required: false
        type: string
        default: ""

env:
  ZIG_VERSION: "0.16.0"
  # SHA-256 of the official zig-x86_64-linux-<ver> release tarball, pinned from
  # ziglang.org's signed download index. This is the toolchain trust anchor: the
  # value lives in THIS repo (it is NOT fetched from ziglang.org at build time),
  # so a compromised ziglang.org/CDN cannot make a tampered tarball pass. It is
  # checked with the runner's built-in sha256sum — no third-party verifier tool.
  # Update in lockstep with ZIG_VERSION (value from ziglang.org/download/index.json).
  ZIG_SHA256: "70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00"

# Lock the injected GITHUB_TOKEN to read-only. The private sibling checkouts
# below use secrets.SPIREFYIO_PAT (a separate fine-grained PAT scoped to
# `contents: read` on spirefyio repos), NOT GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: collab linux-x86
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── Checkout this repo + its forked siblings in a FLAT layout ──
      # Mirrors local dev (~/projects/{collab,zora,ai,desktop}) so the same
      # --fork=../<sibling> paths work identically in CI and on your machine.
      # collab → desktop → zora + ai, so all three deps are checked out and
      # forked; the single top-level fork set satisfies the whole graph.
      - name: Checkout collab (this repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned, supply-chain)
        with:
          path: collab
          persist-credentials: false

      - name: Checkout zora (sibling — forked, not fetched)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned, supply-chain)
        with:
          repository: spirefyio/zora
          ref: ${{ inputs.ref || github.ref_name }}
          token: ${{ secrets.SPIREFYIO_PAT }}
          path: zora
          persist-credentials: false

      - name: Checkout ai (sibling — forked, not fetched)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned, supply-chain)
        with:
          repository: spirefyio/ai
          ref: ${{ inputs.ref || github.ref_name }}
          token: ${{ secrets.SPIREFYIO_PAT }}
          path: ai
          persist-credentials: false

      - name: Checkout desktop (sibling — forked, not fetched)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned, supply-chain)
        with:
          repository: spirefyio/desktop
          ref: ${{ inputs.ref || github.ref_name }}
          token: ${{ secrets.SPIREFYIO_PAT }}
          path: desktop
          persist-credentials: false

      # ── Install Zig 0.16 (checksum-verified, no third-party verifier tool) ──
      # The tarball is checked against the pinned ZIG_SHA256 (env, above) with the
      # runner's built-in sha256sum. The pinned hash lives in this repo, so a
      # compromised ziglang.org/CDN cannot serve a tampered compiler that passes.
      - name: Download Zig
        run: |
          BASE="https://ziglang.org/download/${ZIG_VERSION}"
          TARBALL="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -fsSL --retry 3 --retry-delay 5 "$BASE/$TARBALL" -o zig.tar.xz

      - name: Verify Zig checksum
        run: echo "${ZIG_SHA256}  zig.tar.xz" | sha256sum -c -

      - name: Extract Zig and add to PATH
        run: |
          tar xf zig.tar.xz
          ZIG_DIR=$(ls -d zig-*-"${ZIG_VERSION}")
          echo "$PWD/$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Verify Zig
        run: zig version

      # collab pulls desktop, whose default (react) GUI flavor links GTK + WebKit.
      - name: Install system deps (GTK + WebKit)
        run: |
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      # ── Build + test against the LOCAL forked siblings ──
      # Each --fork overrides collab's pinned git+https sibling URL with the
      # checked-out working copy (Zig matches a fork to its dep by package NAME).
      # The single fork set covers the transitive graph (desktop's own zora/ai
      # deps resolve to the same forks). No token is ever handed to Zig.
      - name: zig build (fork local siblings)
        working-directory: collab
        run: zig build -Dllama_cpp=false --fork=../zora --fork=../ai --fork=../desktop

      - name: zig build test (fork local siblings)
        working-directory: collab
        run: zig build test -Dllama_cpp=false --summary all --fork=../zora --fork=../ai --fork=../desktop

      # ── Artifact manifest (for verify.sh local↔CI comparison) ──
      - name: Generate artifact manifest
        working-directory: collab
        run: bash scripts/manifest.sh zig-out > ci-manifest.json

      - name: Upload artifact manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4 (SHA-pinned, supply-chain)
        with:
          name: ci-manifest
          path: collab/ci-manifest.json
